{% extends "base.html" %}
{% block title %}Confirmar Exclusão — BiblioDist{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-danger mt-4">
      <div class="card-header bg-danger text-white">Confirmar Exclusão</div>
      <div class="card-body">
        <p>Tem certeza que deseja excluir <strong>{{ obj }}</strong>?</p>
        <p class="text-muted small">Esta ação não pode ser desfeita.</p>
        <form method="post" class="d-flex gap-2">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Excluir</button>
          <a href="{% url cancelar_url %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

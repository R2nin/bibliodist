<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}BiblioDist{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .navbar-brand span { color: #F58220; font-weight: 700; }
    .bd-accent { color: #F58220; }
    body { background: #f4f7fa; }
    .table th { background: #004784; color: #fff; }
    .btn-primary { background: #004784; border-color: #004784; }
    .btn-primary:hover { background: #003366; border-color: #003366; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background:#004784;">
  <div class="container">
    <a class="navbar-brand" href="/">Biblio<span>Dist</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="{% url 'livro_list' %}">Livros</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'autor_list' %}">Autores</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'categoria_list' %}">Categorias</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'leitor_list' %}">Leitores</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'emprestimo_list' %}">Empréstimos</a></li>
        <li class="nav-item"><a class="nav-link" href="/admin/">Admin</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-{{ msg.tags|default:'info' }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

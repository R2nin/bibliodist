<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BiblioDist</title>
  <style>
    body { margin:0; font-family: Arial, "Liberation Sans", sans-serif; background:#f4f7fa; color:#1c1c1c;
           display:flex; min-height:100vh; align-items:center; justify-content:center; }
    .card { background:#fff; padding:48px 56px; border-radius:12px; box-shadow:0 6px 24px rgba(0,71,132,.12);
            text-align:center; border-top:6px solid #004784; }
    .bar { height:5px; width:90px; margin:0 auto 20px; border-radius:3px;
           background:linear-gradient(90deg,#004784 55%,#F58220 55%); }
    h1 { color:#004784; margin:0 0 6px; font-size:30px; }
    p { color:#555; margin:4px 0; }
    .tag { color:#F58220; font-weight:bold; }
  </style>
</head>
<body>
  <div class="card">
    <div class="bar"></div>
    <h1>BiblioDist no ar</h1>
    <p>Sistema de Biblioteca <span class="tag">Distribuído</span></p>
    <p>Computação Distribuída — FEMA</p>
  </div>
</body>
</html>
